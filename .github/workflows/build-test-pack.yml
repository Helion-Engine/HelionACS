name: build-test-pack

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install libclang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install libclang-21-dev
          sudo ln -s /usr/lib/llvm-21/lib/libclang-21.1.8.so /usr/lib/llvm-21/lib/libclang.so.21.1
      - name: Restore tools
        run: dotnet tool restore
      - name: Generate bindings
        run: |
          LD_DEBUG=libs LD_LIBRARY_PATH="/usr/lib/llvm-21/lib:$(find ~/.nuget -name libClangSharp.so -exec dirname {} \; | head -n 1):$LD_LIBRARY_PATH" \
            dotnet tool run ClangSharpPInvokeGenerator \
            -c multi-file generate-helper-types \
            --file ./src/cxx/HelionACS.hpp \
            -n HelionACS.Interop \
            --libraryPath HelionACS-native \
            -o ./src/cs/Generated/
      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: src/cs/Generated/

  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            dyn-src: libHelionACS-native.so
            dyn-dest: libHelionACS-native.so
            static-src: libHelionACS-native-static.a
            static-dest: libHelionACS-native-static.a
          - os: macos-latest
            rid: osx-x64
            dyn-src: libHelionACS-native.dylib
            dyn-dest: libHelionACS-native.dylib
            static-src: libHelionACS-native-static.a
            static-dest: libHelionACS-native-static.a
          - os: windows-latest
            rid: win-x64
            dyn-src: Release/HelionACS-native.dll
            dyn-dest: HelionACS-native.dll
            static-src: Release/HelionACS-native-static.lib
            static-dest: HelionACS-native-static.lib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake ninja-build
      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja
      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G "Visual Studio 17 2022" -A x64
      - name: Build native (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build
      - name: Build native (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release
      - name: Copy built file
        shell: bash
        run: |
          mkdir -p build-native/${{ matrix.rid }}
          cp build/${{ matrix.dyn-src }} build-native/${{ matrix.rid }}/${{ matrix.dyn-dest }}
          cp build/${{ matrix.static-src }} build-native/${{ matrix.rid }}/${{ matrix.static-dest }}
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build-native

  test:
    runs-on: ${{ matrix.os }}
    needs: [generate, build-native]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download generated sources
        uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: src/cs/Generated/
      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build-native
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build

  pr_success:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - run: echo "All tests passed"

  pack:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download generated sources
        uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: src/cs/Generated/
      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: build-native
          merge-multiple: true
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Set version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          REF_NAME=$(echo ${{ github.ref_name }} | tr '[:upper:]' '[:lower:]' | sed 's#[^a-zA-Z0-9-]#-#g')
          echo 'PACKAGE_ID="${{ github.repository_owner }}.HelionACS"' >> $GITHUB_ENV
          if [ "$REF_NAME" = "main" ]; then
            echo "VERSION=0.1.1-pre.$COMMIT_COUNT+$SHORT_SHA" >> $GITHUB_ENV
          else
            echo "VERSION=0.1.1-pre-$REF_NAME.$COMMIT_COUNT+$SHORT_SHA" >> $GITHUB_ENV
          fi
      - name: Pack NuGet
        run: |
          dotnet pack src/cs/HelionACS.csproj -c Release -o out \
            -p:PackageId=$PACKAGE_ID \
            -p:PackageVersion=$VERSION
      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: out/*.nupkg

  publish:
    runs-on: ubuntu-latest
    needs: pack
    if: (github.event_name == 'push') && (github.ref == 'refs/heads/main') && (vars.PUBLISH == 'true')
    steps:
      - name: Download generated sources
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: out
      - name: Publish to Github NuGet
        run: |
          dotnet nuget push "out/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "out/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
