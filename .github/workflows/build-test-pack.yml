name: build-test-pack

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install libclang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install libclang-21-dev
          sudo ln -s /usr/lib/llvm-21/lib/libclang-21.1.8.so /usr/lib/llvm-21/lib/libclang.so.21.1
      - name: Restore tools
        run: dotnet tool restore
      - name: Generate bindings
        run: |
          LD_DEBUG=libs LD_LIBRARY_PATH="/usr/lib/llvm-21/lib:$(find ~/.nuget -name libClangSharp.so -exec dirname {} \; | head -n 1):$LD_LIBRARY_PATH" \
            dotnet tool run ClangSharpPInvokeGenerator \
            -c multi-file generate-helper-types \
            --file ./src/cxx/HelionACS.hpp \
            -n HelionACS.Interop \
            --libraryPath HelionACS-native \
            -o ./src/cs/Generated/
      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: src/cs/Generated/

  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            libname: libHelionACS-native.so
          - os: macos-latest
            rid: osx-x64
            libname: libHelionACS-native.dylib
          - os: windows-latest
            rid: win-x64
            libname: HelionACS-native.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake ninja-build
      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y
      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build native
        run: cmake --build build
      - name: Copy built file
        shell: bash
        run: |
          mkdir -p build-native/${{ matrix.rid }}
          cp build/${{ matrix.libname }} build-native/${{ matrix.rid }}/
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build-native

  test:
    runs-on: ${{ matrix.os }}
    needs: [generate, build-native]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
    steps:
      - uses: actions/checkout@v4
      - name: Download generated sources
        uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: src/cs/Generated/
      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build-native
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build

  pack:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Download generated sources
        uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: src/cs/Generated/
      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: build-native
          merge-multiple: true
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Set version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "VERSION=1.0.0-ci.$SHORT_SHA" >> $GITHUB_ENV
      - name: Pack NuGet
        run: dotnet pack src/cs/HelionACS.csproj -c Release -o out
      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: out/*.nupkg
      - name: Push NuGet package
        run: |
          dotnet nuget push "out/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
